<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Dark Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          transitionProperty: {
            'colors': 'background-color, border-color, color, fill, stroke, opacity, box-shadow, text-shadow',
          }
        }
      }
    }
  </script>
</head>
<body class="flex min-h-screen items-center justify-center bg-gray-100 dark:bg-gray-900 transition-colors duration-500">
  <div class="text-center">
    <h1 class="text-4xl font-bold text-gray-800 dark:text-gray-100 mb-6 transition-colors duration-500">Hello, World!</h1>
    <button id="toggle" class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-400 dark:bg-indigo-500 dark:hover:bg-indigo-400 transition-colors duration-300">
      Toggle Dark Mode
    </button>
  </div>
  <script>
    const btn = document.getElementById('toggle');
    const html = document.documentElement;
    const theme = localStorage.getItem('theme');
    if (theme === 'dark') html.classList.add('dark');
    btn.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>
</body>
</html>
