<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World - Dark Mode Toggle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind config for dark mode based on class
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            fade: 'fadeOut 0.5s ease-out forwards',
            bounce: 'bounce 0.6s infinite',
          },
          keyframes: {
            fadeOut: {
              '0%': { opacity: '1' },
              '100%': { opacity: '0' },
            },
            bounce: {
              '0%, 100%': { transform: 'translateY(-25%)', animationTimingFunction: 'cubic-bezier(0.8,0,1,1)' },
              '50%': { transform: 'none', animationTimingFunction: 'cubic-bezier(0,0,0.2,1)' },
            },
          },
        },
      },
    };
  </script>
  <style>
    .toggle-thumb {
      transition: transform 0.3s ease;
    }
    .toggle-checkbox:checked ~ .toggle-thumb {
      transform: translateX(1.5rem);
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 flex items-center justify-center min-h-screen transition-colors duration-300">
  <div class="text-center space-y-8 p-6">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-wide animate-bounce">Hello, World!</h1>
    <button id="darkModeToggle" class="flex items-center mx-auto px-4 py-2 bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 text-white rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-colors duration-200">
      <span class="mr-2">Toggle Dark Mode</span>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 3v1m0 16v1m8.66-12.34l-.71.71M5.05 18.95l-.71.71M21 12h-1M4 12H3m15.66 4.66l-.71-.71M5.05 5.05l-.71-.71M12 5a7 7 0 100 14 7 7 0 000-14z"/>
      </svg>
    </button>
    <label class="inline-flex items-center cursor-pointer">
      <input type="checkbox" id="themeSwitch" class="sr-only toggle-checkbox">
      <div class="w-12 h-6 bg-gray-300 dark:bg-gray-600 rounded-full relative">
        <div class="toggle-thumb absolute left-0 top-0 w-6 h-6 bg-white dark:bg-gray-200 rounded-full shadow transform"></div>
      </div>
    </label>
  </div>
  <script>
    const themeSwitch = document.getElementById('themeSwitch');
    const root = document.documentElement;

    const setTheme = (dark) => {
      if (dark) {
        root.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      } else {
        root.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      }
    };

    // Initialize theme from storage or system preference
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      setTheme(savedTheme === 'dark');
      themeSwitch.checked = savedTheme === 'dark';
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(prefersDark);
      themeSwitch.checked = prefersDark;
    }

    themeSwitch.addEventListener('change', () => setTheme(themeSwitch.checked));
    document.getElementById('darkModeToggle').addEventListener('click', () => {
      themeSwitch.checked = !themeSwitch.checked;
      setTheme(themeSwitch.checked);
    });
  </script>
</body>
</html>
