create_webapp:
  description: |
    Create a complete single-file web application for this request:
    {user_request}
    
    Important Instructions:
    - First, create a clean project folder inside "projects/" using a suitable kebab-case name (example: projects/pomodoro-timer/)
    - Generate a complete, beautiful web app as a single index.html file
    - Use Tailwind CSS via CDN
    - Make it modern, responsive, and fully functional
    - Add dark mode toggle when suitable
  expected_output: The complete web app saved as index.html inside its own project folder under the "projects" directory.
  output_file: index.html