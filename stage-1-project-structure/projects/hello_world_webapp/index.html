<!DOCTYPE html>
<html lang="en" class="transition-colors duration-300">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World - Dark Mode Toggle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>
</head>
<body class="antialiased bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-400 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl rounded-3xl p-12 shadow-2xl border border-white/50 dark:border-slate-700/50 transition-all duration-500 hover:shadow-3xl">
      <h1 class="text-6xl md:text-7xl lg:text-8xl font-black text-slate-900 dark:text-white mb-12 drop-shadow-2xl dark:drop-shadow-none bg-gradient-to-r from-slate-900 to-slate-700 dark:from-indigo-400 dark:to-purple-400 bg-clip-text dark:text-transparent leading-tight">
        Hello, World!
      </h1>
      <button
        id="toggleDarkMode"
        class="w-full px-8 py-6 bg-gradient-to-r from-indigo-500 to-purple-600 dark:from-purple-600 dark:to-pink-500 hover:from-indigo-600 hover:to-purple-700 dark:hover:from-purple-700 dark:hover:to-pink-600 text-xl font-bold text-white rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-2 active:translate-y-1 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-indigo-500/50 dark:focus:ring-purple-500/50"
      >
        🌙 Dark Mode
      </button>
    </div>
  </main>

  <script>
    const html = document.documentElement;
    const toggleBtn = document.getElementById('toggleDarkMode');

    // Load saved theme
    if (localStorage.getItem('darkMode') === 'true') {
      html.classList.add('dark');
    }

    // Set initial button text
    const isDark = html.classList.contains('dark');
    toggleBtn.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';

    // Toggle function
    toggleBtn.addEventListener('click', () => {
      html.classList.toggle('dark');
      const nowDark = html.classList.contains('dark');
      toggleBtn.textContent = nowDark ? '☀️ Light Mode' : '🌙 Dark Mode';
      localStorage.setItem('darkMode', nowDark);
    });
  </script>
</body>
</html>
